<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GALAXY MOTO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:url(images/hero-bg.jpg);background-size:cover;background-position:center}
.hero__ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.55) 100%);backdrop-filter:blur(2px)}
.hero__ct{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:80px 20px 40px;gap:6px;max-width:500px;width:100%}
.bdg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:5px 12px 5px 8px;border-radius:16px;background:#fff;color:#111;margin-bottom:4px}
.bdg .dot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0}
.ttl{font-size:clamp(24px,5vw,36px);font-weight:800;line-height:1.2;color:#fff}
.dsc{font-size:clamp(14px,2.5vw,16px);line-height:1.5;max-width:400px;color:rgba(255,255,255,.8)}
.ymap{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;background:rgba(255,255,255,.08);backdrop-filter:blur(8px);margin:4px 0 10px;text-decoration:none;cursor:pointer}
.ymap .star{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#0bc5ea,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ymap .ytxt{text-align:center}
.ymap .ylabel{font-size:clamp(11px,2vw,13px);color:rgba(255,255,255,.6)}
.ymap .yvalue{font-size:14px;color:#fff;font-weight:700}
.btns{display:flex;flex-direction:column;gap:6px;width:100%;max-width:300px}
.br{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;font-size:clamp(14px,2.5vw,16px);font-weight:600;font-family:inherit;border:none;cursor:pointer;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)}
.btn:active{transform:scale(.97)}
.ct-hd{text-align:center;padding:60px 20px 24px}
.ct-hd h2{font-size:24px;font-weight:800;color:#111;margin-bottom:4px;text-transform:uppercase}
.ct-hd p{font-size:14px;color:#888}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px;max-width:500px;margin:0 auto}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr 1fr;max-width:800px}}
.card{border-radius:12px;overflow:hidden;background:#fff;cursor:pointer;border:1px solid #eee}
.card:active{transform:scale(.97)}
.card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.ci{padding:8px 10px 12px}
.ci .n{font-size:14px;font-weight:700;color:#111;text-transform:uppercase}
.ci .st{font-size:11px;color:#888}
.ci .p{font-size:13px;font-weight:700;color:#111}
.ci .p .old{font-size:11px;color:#aaa;text-decoration:line-through;margin-right:4px}
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);justify-content:center;align-items:center}
.modal.open{display:flex}
.modal-inner{position:relative;background:#fff;border-radius:20px;max-width:480px;width:calc(100% - 32px);max-height:90vh;overflow-y:auto;animation:slideUp .35s cubic-bezier(0.32,0.72,0,1);padding:0 0 24px}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:18px;cursor:pointer}
.modal-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;border-radius:20px 20px 0 0}
.modal-body{padding:20px;text-align:center}
.modal-body h3{font-size:20px;font-weight:800;color:#111}
.modal-body .price{font-size:20px;font-weight:800;color:#111;margin:4px 0 16px}
.modal-body .price .old{font-size:15px;color:#aaa;text-decoration:line-through;margin-right:8px}
.specs-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.specs-table td{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.specs-table td:first-child{color:#888;width:45%}
.specs-table td:last-child{color:#111;font-weight:500}
.btn-td{display:inline-block;padding:12px 20px;background:#111;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-td:hover{background:#333}
</style>
</head>
<body>
<section class="hero">
  <div class="hero__ov"></div>
  <div class="hero__ct">
    <div class="bdg"><span class="dot"></span> Работаем ежедневно</div>
    <h1 class="ttl">GALAXY MOTO<br>ПОЛНЫЙ ЦИКЛ ТВОЕГО ДВИЖЕНИЯ</h1>
    <p class="dsc">Покупка, аренда, честный сервис и оригинальные запчасти для мототехники.<br>Берем все заботы на себя</p>
    <a class="ymap" href="https://yandex.ru/maps/org/galaxy_moto_service/172501949586?si=yxf246m7a7ggw2z6pgn57vvtrw" target="_blank">
      <div class="star">⭐</div>
      <div class="ytxt"><div class="ylabel">Яндекс.Карты</div><div class="yvalue">оценка 5.0</div></div>
    </a>
    <div class="btns">
      <button class="btn">Выбрать технику</button>
      <div class="br">
        <button class="btn">Взять в аренду</button>
        <button class="btn">Записаться на сервис</button>
      </div>
    </div>
  </div>
</section>
<section style="padding:0 0 40px">
<div class="ct-hd">
  <h2>Каталог техники</h2>
  <p>Выбирай технику под свой характер и задачи</p>
</div>
<div class="grid" id="catalogGrid"></div>
</section>
<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <h3 id="modalTitle"></h3>
      <div class="price" id="modalPrice"></div>
      <table class="specs-table" id="modalSpecs"></table>
      <button class="btn-td" onclick="alert('Запись на тест-драйв')">Записаться на тест-драйв</button>
    </div>
  </div>
</div>
<script>
const models = [
  {id:1,name:"TANK NEXT",img:"images/catalog/tank-next.jpg",price:72900,oldPrice:89900,status:"б/у",specs:[["Состояние","б/у"],["Пластик","без трещин"],["Технически","отличное"],["Пробег","12000 км"],["Мощность","150/49сс"],["Подача","карбюратор"],["Охлаждение","воздушное"],["Макс.скорость","100 км/ч"],["Колёса","12/12"]]},
  {id:2,name:"TANK X",img:"images/catalog/tank-x.jpg",price:129900,oldPrice:0,status:"новый",specs:[["Состояние","новый"],["Пластик","новый"],["Пробег","0 км"],["Мощность","175/49сс"],["Подача","карбюратор"],["Охлаждение","воздушное"],["Макс.скорость","100 км/ч"],["Колёса","13/13"]]},
  {id:3,name:"N-MAX BAM-X",img:"images/catalog/n-max-bam-x-1.jpg",price:169900,oldPrice:0,status:"б/у",specs:[["Состояние","б/у"],["Пластик","без трещин"],["Технически","отлично"],["Пробег","2700 км"],["Мощность","175/49сс"],["Подача","инжектор"],["Охлаждение","водяное"],["Макс.скорость","100 км/ч"],["Колёса","13/13"]]},
  {id:4,name:"MAXI / GALAXY",img:"images/catalog/maxi-galaxy.jpg",price:65900,oldPrice:0,status:"б/у",specs:[["Состояние","б/у"],["Пластик","притёртости"],["Технически","отличное"],["Пробег","13800 км"],["Мощность","150/49сс"],["Подача","карбюратор"],["Охлаждение","воздушное"],["Макс.скорость","100 км/ч"],["Колёса","12/12"]]},
  {id:5,name:"HONDA SUNDERO",img:"images/catalog/honda-sundero-1.jpg",price:249900,oldPrice:0,status:"новая",specs:[["Состояние","новая"],["Пластик","новый"],["Пробег","0 км"],["Мощность","150/49сс"],["Подача","инжектор"],["Охлаждение","воздушное"],["Макс.скорость","100 км/ч"],["Колёса","10/10"]]},
  {id:6,name:"TANK KUNHAO",img:"images/catalog/tank-kunhao-1.jpg",price:84900,oldPrice:0,status:"б/у",specs:[["Состояние","б/у"],["Пластик","притёртости"],["Технически","отличное"],["Пробег","1700 км"],["Мощность","150/49сс"],["Подача","карбюратор"],["Охлаждение","воздушное"],["Макс.скорость","100 км/ч"],["Колёса","12/12"]]},
  {id:7,name:"TANK KUNHAO 2",img:"images/catalog/tank-kunhao2-1.jpg",price:72900,oldPrice:0,status:"б/у",specs:[["Состояние","б/у"],["Пластик","без трещин"],["Технически","после ремонта"],["Пробег","17000 км"],["Мощность","150/49сс"],["Подача","карбюратор"],["Охлаждение","воздушное"],["Макс.скорость","100 км/ч"],["Колёса","12/12"]]},
  {id:8,name:"ADV BAM-X",img:"images/catalog/adv-bam-x-1.jpg",price:149900,oldPrice:0,status:"новый",specs:[["Состояние","новый"],["Пластик","новый"],["Пробег","0 км"],["Мощность","175/49сс"],["Подача","карбюратор"],["Охлаждение","воздушное"],["Макс.скорость","100 км/ч"],["Колёса","14/14"]]},
  {id:9,name:"GUSITE AGV-R",img:"images/catalog/gusite-agv-r-1.jpg",price:194900,oldPrice:0,status:"новый",specs:[["Состояние","новый"],["Пластик","новый"],["Пробег","0 км"],["Мощность","200/49сс"],["Подача","инжектор"],["Охлаждение","воздушное"],["Макс.скорость","110 км/ч"],["Колёса","13/14"]]}
];
const grid = document.getElementById('catalogGrid');
models.forEach(m => {
  const c = document.createElement('div');
  c.className = 'card';
  c.innerHTML = '<img src="'+m.img+'" loading="lazy"><div class="ci"><div class="n">'+m.name+'</div><div class="st">'+m.status+'</div><div class="p">'+(m.oldPrice?'<span class="old">'+m.oldPrice.toLocaleString('ru-RU')+' ₽</span>':'')+m.price.toLocaleString('ru-RU')+' ₽</div></div>';
  c.onclick = () => openModal(m);
  grid.appendChild(c);
});
function openModal(m) {
  document.getElementById('modalImg').src = m.img;
  document.getElementById('modalTitle').textContent = m.name;
  document.getElementById('modalPrice').innerHTML = (m.oldPrice?'<span class="old">'+m.oldPrice.toLocaleString('ru-RU')+' ₽</span> ':'')+m.price.toLocaleString('ru-RU')+' ₽';
  const tb = document.getElementById('modalSpecs');
  tb.innerHTML = '';
  m.specs.forEach(s => { const tr = document.createElement('tr'); tr.innerHTML = '<td>'+s[0]+'</td><td>'+s[1]+'</td>'; tb.appendChild(tr); });
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modal').onclick = function(e) { if (e.target === this) closeModal(); };
</script>
</body>
</html>
