<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GALAXY MOTO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased}

/* Hero */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background-image:url(images/hero-bg.jpg);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat
}
.hero__ov{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.55) 100%);
  backdrop-filter:blur(2px)
}
.hero__ct{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:80px 20px 40px;
  gap:6px;
  max-width:500px;
  width:100%
}
.bdg{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  font-weight:600;
  padding:5px 12px 5px 8px;
  border-radius:16px;
  background:#fff;
  color:#111;
  margin-bottom:4px
}
.bdg .dot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0}
.ttl{font-size:clamp(24px,5vw,36px);font-weight:800;line-height:1.2;color:#fff;margin-bottom:4px}
.dsc{font-size:clamp(14px,2.5vw,16px);line-height:1.5;max-width:400px;color:rgba(255,255,255,.8);margin-bottom:4px}
.ymap{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  margin:4px 0 10px;
  text-decoration:none;
  cursor:pointer
}
.ymap .star{
  width:28px;height:28px;
  border-radius:50%;
  background:linear-gradient(135deg,#0bc5ea,#8b5cf6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  flex-shrink:0
}
.ymap .ytxt{text-align:left;font-size:clamp(14px,2.5vw,16px);color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.04em}
.ymap .ytxt strong{display:block;font-size:clamp(14px,2.5vw,16px);color:#fff;text-transform:none;letter-spacing:0;font-weight:700}
.btns{display:flex;flex-direction:column;gap:6px;width:100%;max-width:300px}
.br{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px 16px;
  border-radius:12px;
  font-size:clamp(14px,2.5vw,16px);
  font-weight:600;
  font-family:inherit;
  border:none;
  cursor:pointer;
  text-decoration:none;
  transition:all .12s
}
.btn:active{transform:scale(.97)}
.b1,.b2{
  background:rgba(255,255,255,.08);
  color:#fff;
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px)
}
.b1:hover,.b2:hover{background:rgba(255,255,255,.15)}
</style>
</head>
<body>
<section class="hero">
  <div class="hero__ov"></div>
  <div class="hero__ct">
    <div class="bdg"><span class="dot"></span> Работаем ежедневно</div>
    <h1 class="ttl">GALAXY MOTO<br>ПОЛНЫЙ ЦИКЛ ТВОЕГО ДВИЖЕНИЯ</h1>
    <p class="dsc">Покупка, аренда, честный сервис и оригинальные запчасти для мототехники.<br>Берем все заботы на себя</p>
    <a class="ymap" href="https://yandex.ru/maps/org/galaxy_moto_service/172501949586" target="_blank">
      <div class="star">⭐</div>
      <div class="ytxt">Яндекс.Карты<strong>оценка 5.0</strong></div>
    </a>
    <div class="btns">
      <button class="btn b1">Выбрать технику</button>
      <div class="br">
        <button class="btn b2">Взять в аренду</button>
        <button class="btn b2">Записаться на сервис</button>
      </div>
    </div>
  </div>
</section>
</body>
</html>
