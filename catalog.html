<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GALAXY MOTO — Каталог техники</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;-webkit-font-smoothing:antialiased;padding:0 0 60px}

/* Header */
.ct-hd{text-align:center;padding:60px 20px 24px}
.ct-hd h2{font-size:24px;font-weight:800;color:#111;margin-bottom:4px}
.ct-hd p{font-size:14px;color:#888}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px;max-width:500px;margin:0 auto}
.card{border-radius:12px;overflow:hidden;background:#fff;cursor:pointer;transition:all .15s;border:1px solid #eee}
.card:active{transform:scale(.97)}
.card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.ci{padding:8px 10px 12px}
.ci .n{font-size:13px;font-weight:700;color:#111;margin-bottom:2px}
.ci .m{font-size:10px;color:#888;line-height:1.4;margin-bottom:4px}
.ci .p{font-size:14px;font-weight:700;color:#0bc5ea}
.ci .p .old{font-size:11px;color:#aaa;text-decoration:line-through;margin-right:4px}

/* Modal */
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:0;overflow-y:auto;justify-content:center;align-items:center}
.modal.open{display:flex}
.modal-inner{position:relative;background:#fff;border-radius:20px;margin:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:slideUp .35s cubic-bezier(0.32,0.72,0,1);padding:0 0 24px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;border-radius:20px 20px 0 0}
.modal-body{padding:20px 20px 0}
.modal-body h3{font-size:20px;font-weight:800;color:#111;margin-bottom:12px}
.modal-body .price{font-size:22px;font-weight:800;color:#0bc5ea;margin-bottom:16px}
.modal-body .price .old{font-size:15px;color:#aaa;text-decoration:line-through;margin-right:8px;font-weight:500}
.specs-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.specs-table td{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.specs-table td:first-child{color:#888;width:45%}
.specs-table td:last-child{color:#111;font-weight:500}
.btn-td{display:block;width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px}
.btn-td:hover{background:#333}
.modal-close{position:absolute;top:12px;right:12px;z-index:5;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal.open .modal-close{display:flex}
</style>
</head>
<body>

<div class="ct-hd">
  <h2>Каталог техники</h2>
  <p>Выбирай технику под свой характер и задачи</p>
</div>

<div class="grid" id="catalogGrid"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-inner" id="modalInner">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <h3 id="modalTitle"></h3>
      <div class="price" id="modalPrice"></div>
      <table class="specs-table" id="modalSpecs"></table>
      <button class="btn-td" onclick="alert('🚀 Тест-драйв')">🚀 Записаться на тест-драйв</button>
    </div>
  </div>
</div>

<script>
const models = [
  {
    id:1, name:"Tank Next", img:"images/catalog/maxi-galaxy-3.jpg", price:72900, oldPrice:89900,
    specs:[
      ["Состояние","б/у"],
      ["Пластик","без трещин"],
      ["Технически","отличное"],
      ["Пробег","12000 км"],
      ["Мощность","150/49сс"],
      ["Тип подачи","карбюратор"],
      ["Охлаждение","воздушное"],
      ["Макс. скорость","100 км/ч"],
      ["Колёса","12/12"]
    ]
  },
  {
    id:2, name:"Gusite AGV R2", img:"images/catalog/gusite-agv-r-2.jpg", price:139900, oldPrice:169900,
    specs:[
      ["Состояние","новый"],
      ["Мощность","175cc"],
      ["Подача","инжектор"],
      ["Охлаждение","жидкостное"],
      ["Макс. скорость","120 км/ч"]
    ]
  },
  {
    id:3, name:"V3 Sport", img:"images/catalog/v3-photo1.jpg", price:149900,
    specs:[
      ["Состояние","б/у"],
      ["Пробег","8000 км"],
      ["Мощность","200cc"],
      ["Макс. скорость","140 км/ч"]
    ]
  },
  {
    id:4, name:"T5 City", img:"images/catalog/t5-photo1.jpg", price:99900,
    specs:[
      ["Состояние","б/у"],
      ["Пробег","15000 км"],
      ["Мощность","125cc"],
      ["Макс. скорость","90 км/ч"]
    ]
  },
  {
    id:5, name:"Maxi Galaxy", img:"images/catalog/maxi-galaxy.jpg", price:119900,
    specs:[
      ["Состояние","новый"],
      ["Мощность","150cc"],
      ["Макс. скорость","110 км/ч"]
    ]
  },
  {
    id:6, name:"PX3", img:"images/catalog/px3-photo1.jpg", price:109900,
    specs:[
      ["Состояние","б/у"],
      ["Мощность","125cc"],
      ["Макс. скорость","95 км/ч"]
    ]
  }
];

const grid = document.getElementById('catalogGrid');
models.forEach(m => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<img src="'+m.img+'" loading="lazy"><div class="ci"><div class="n">'+m.name+'</div><div class="m">'+m.specs[0][1]+' · '+m.specs.filter((s,i)=>i>0&&i<3).map(s=>s[1]).join(' · ')+'</div><div class="p">'+(m.oldPrice?'<span class="old">'+m.oldPrice.toLocaleString('ru-RU')+' ₽</span>':'')+m.price.toLocaleString('ru-RU')+' ₽</div></div>';
  card.onclick = () => openModal(m);
  grid.appendChild(card);
});

function openModal(m) {
  document.getElementById('modalImg').src = m.img;
  document.getElementById('modalTitle').textContent = m.name;
  const priceEl = document.getElementById('modalPrice');
  priceEl.innerHTML = (m.oldPrice?'<span class="old">'+m.oldPrice.toLocaleString('ru-RU')+' ₽</span> ':'')+m.price.toLocaleString('ru-RU')+' ₽';
  
  const tbody = document.getElementById('modalSpecs');
  tbody.innerHTML = '';
  m.specs.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>'+s[0]+'</td><td>'+s[1]+'</td>';
    tbody.appendChild(tr);
  });
  
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal').onclick = function(e) {
  if (e.target === this) closeModal();
};
</script>
</body>
</html>
