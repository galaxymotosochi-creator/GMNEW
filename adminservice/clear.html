<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Очистка Firestore</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>body{font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111;padding:20px}.box{background:#fff;border-radius:16px;padding:2rem;max-width:400px;width:100%;text-align:center}h2{margin:0 0 4px}button{padding:12px 24px;font-size:15px;font-weight:600;font-family:inherit;border:none;border-radius:10px;cursor:pointer;margin-top:16px}#del{background:#e53935;color:#fff}#del:disabled{opacity:.5}#log{margin-top:16px;font-size:13px;color:#888;text-align:left;max-height:200px;overflow-y:auto;padding:8px;background:#f5f5f5;border-radius:8px}</style>
</head><body>
<div class="box">
  <h2>🔥 Очистка Firestore</h2>
  <p style="font-size:13px;color:#888;margin:4px 0 16px">Удаление всех записей из galaxymoto_bookings</p>
  <p style="font-size:12px;color:#888" id="status">⏳ Подключение к Firebase...</p>
  <button id="del" disabled onclick="run()">🗑️ Очистить все записи</button>
  <div id="log"></div>
</div>
<script>
const FC = {
  apiKey: "AIzaSyDOZnESPJRJlEf3HTYqNyv1O0mYUZoPJzc",
  authDomain: "capsulehouse-1c0c9.firebaseapp.com",
  projectId: "capsulehouse-1c0c9",
  storageBucket: "capsulehouse-1c0c9.firebasestorage.app",
  messagingSenderId: "640070206939",
  appId: "1:640070206939:web:e7ba997ec68457be2893fe"
};
try {
  firebase.initializeApp(FC);
  var db = firebase.firestore();
  db.settings({merge:true});
  document.getElementById('status').textContent = '✅ Firebase подключён. Готово к очистке.';
  document.getElementById('del').disabled = false;
} catch(e) {
  document.getElementById('status').textContent = '❌ Ошибка: ' + e.message;
}
function log(t) {
  var el = document.getElementById('log');
  el.innerHTML += '<div>' + t + '</div>';
  el.scrollTop = el.scrollHeight;
}
async function run() {
  if (!confirm('Удалить ВСЕ записи из Firestore? Это необратимо!')) return;
  var btn = document.getElementById('del');
  btn.disabled = true;
  btn.textContent = '⏳ Удаление...';
  var total = 0;
  var cols = ['galaxymoto_bookings', 'leads'];
  for (var c of cols) {
    log('📂 Чтение коллекции ' + c + '...');
    var snap = await db.collection(c).get();
    var n = snap.size;
    log('📄 Найдено ' + n + ' документов');
    if (n === 0) continue;
    var batch = db.batch();
    var i = 0;
    snap.forEach(function(doc) {
      batch.delete(doc.ref);
      i++;
      if (i % 500 === 0) {
        // Firestore batch limit is 500
      }
    });
    await batch.commit();
    total += n;
    log('✅ Удалено ' + n + ' из ' + c);
  }
  log('🎉 Всего удалено: ' + total + ' записей');
  btn.textContent = '✅ Готово';
  document.getElementById('status').textContent = '✅ Firestore очищен. Всего удалено: ' + total;
}
</script>
</body></html>
